<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MadrasaTech — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a56db;--primary-dark:#1e429f;--primary-light:#ebf5ff;
  --emerald:#059669;--amber:#d97706;--rose:#e11d48;
  --bg:#f0f4f8;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --sidebar:#0f172a;--sidebar-accent:#1e293b;
}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1a56db 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:420px}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo{width:72px;height:72px;background:linear-gradient(135deg,#1a56db,#7c3aed);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;box-shadow:0 8px 32px rgba(26,86,219,.4)}
.logo-title{color:#fff;font-size:28px;font-weight:700;letter-spacing:-0.5px}
.logo-sub{color:rgba(255,255,255,.6);font-size:13px;margin-top:4px}
.card{background:#fff;border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h2{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:6px}
.card-sub{color:#64748b;font-size:13px;margin-bottom:28px}
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;transition:.2s;outline:none}
input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a56db,#1e429f);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,86,219,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.demo-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px 16px;margin-top:20px}
.demo-box h4{font-size:12px;font-weight:700;color:#065f46;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.demo-cred{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:4px}
.demo-cred span{color:#047857;font-family:monospace;font-weight:600}
.demo-btn{font-size:11px;color:#1a56db;cursor:pointer;font-weight:600;border:1px solid #93c5fd;background:#eff6ff;padding:2px 8px;border-radius:6px;white-space:nowrap}
.demo-btn:hover{background:#dbeafe}
.footer-note{text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,.5)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo">🏫</div>
    <div class="logo-title">MadrasaTech</div>
    <div class="logo-sub">Système de Gestion Scolaire — Maroc</div>
  </div>
  <div class="card">
    <h2>Connexion</h2>
    <p class="card-sub">Accédez à votre espace de gestion</p>
    <div class="error" id="err"></div>
    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="admin@madrasatech.ma" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn" id="btn" onclick="login()">Se connecter</button>
    <div class="demo-box">
      <h4>🔑 Comptes de démonstration</h4>
      <div class="demo-cred">
        <div>Admin : <span>admin@madrasatech.ma</span></div>
        <div class="demo-btn" onclick="fill('admin@madrasatech.ma','admin2024')">Utiliser</div>
      </div>
      <div class="demo-cred">
        <div>Demo : <span>demo@madrasatech.ma</span></div>
        <div class="demo-btn" onclick="fill('demo@madrasatech.ma','demo2024')">Utiliser</div>
      </div>
    </div>
  </div>
  <div class="footer-note">© 2024 MadrasaTech · Conçu pour les écoles marocaines</div>
</div>
<script>
function fill(e,p){ document.getElementById('email').value=e; document.getElementById('pass').value=p; }
document.getElementById('pass').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });

async function login(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('btn');
  err.style.display='none';
  if(!email||!pass){ err.textContent='Veuillez remplir tous les champs'; err.style.display='block'; return; }
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Connexion...';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass}),credentials:'include'});
    const data=await r.json();
    if(r.ok){ window.location.href='/'; }
    else{ err.textContent=data.error||'Erreur de connexion'; err.style.display='block'; btn.disabled=false; btn.textContent='Se connecter'; }
  }catch(e){ err.textContent='Erreur réseau. Réessayez.'; err.style.display='block'; btn.disabled=false; btn.textContent='Se connecter'; }
}
</script>
</body>
</html>
